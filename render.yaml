databases:
  - name: ecokin
    databaseName: ecokin
    user: ecokin
    plan: free
    region: frankfurt

services:
  - type: web
    name: ecokin-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ecokin
          property: connectionString
      - key: SESSION_DURATION_DAYS
        value: "7"
      - key: SESSION_COOKIE_NAME
        value: ecokin_session
      - key: FRONTEND_URLS
        sync: false      # tu le remplis dans le dashboard
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
